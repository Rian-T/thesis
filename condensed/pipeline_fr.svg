<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 145">
  <defs>
    <style>
      .box { rx: 4; ry: 4; stroke-width: 1.2; }
      .stage-bg { fill: #fafafa; stroke: #e5e5e5; stroke-width: 1; rx: 6; }
      .text-main { font-family: Helvetica, Arial, sans-serif; font-size: 10.5px; fill: #1a1a1a; font-weight: 600; }
      .text-sub { font-family: Helvetica, Arial, sans-serif; font-size: 8px; fill: #666; }
      .text-stage { font-family: Helvetica, Arial, sans-serif; font-size: 9px; fill: #666; font-weight: 600; }
      .text-connect { font-family: Helvetica, Arial, sans-serif; font-size: 8px; fill: #888; }
      .arrow { stroke: #aaa; stroke-width: 1; fill: none; }
      .arrow-head { fill: #aaa; }
      .connect { stroke: #888; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <rect x="8" y="8" width="464" height="48" class="stage-bg"/>
  <text x="18" y="28" class="text-stage">Étape 1</text>

  <rect x="75" y="16" width="78" height="32" class="box" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="114" y="30" text-anchor="middle" class="text-main" style="font-size:9px">Échantillon PMC</text>
  <text x="114" y="41" text-anchor="middle" class="text-sub">400 k paragraphes</text>

  <line x1="157" y1="32" x2="183" y2="32" class="arrow"/>
  <polygon points="183,32 177,29 177,35" class="arrow-head"/>

  <rect x="187" y="16" width="88" height="32" class="box" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="231" y="30" text-anchor="middle" class="text-main">Llama-3.1-70B</text>
  <text x="231" y="41" text-anchor="middle" class="text-sub">annoter</text>

  <line x1="279" y1="32" x2="305" y2="32" class="arrow"/>
  <polygon points="305,32 299,29 299,35" class="arrow-head"/>

  <rect x="309" y="16" width="105" height="32" class="box" fill="#fefce8" stroke="#facc15"/>
  <text x="361" y="30" text-anchor="middle" class="text-main">Annotations</text>
  <text x="361" y="41" text-anchor="middle" class="text-sub" style="font-size:7px">type, domaine, intérêt, langue</text>

  <path d="M 361 58 L 361 67 Q 361 71, 357 71 L 235 71 Q 231 71, 231 75 L 231 76" class="connect" fill="none"/>
  <polygon points="231,79 228,74 234,74" fill="#888"/>
  <text x="296" y="68" text-anchor="middle" class="text-connect">entraîner le classifieur</text>

  <rect x="8" y="80" width="464" height="48" class="stage-bg"/>
  <text x="18" y="100" class="text-stage">Étape 2</text>

  <rect x="75" y="88" width="78" height="32" class="box" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="114" y="102" text-anchor="middle" class="text-main">PMC complet</text>
  <text x="114" y="113" text-anchor="middle" class="text-sub">133 M paragraphes</text>

  <line x1="157" y1="104" x2="183" y2="104" class="arrow"/>
  <polygon points="183,104 177,101 177,107" class="arrow-head"/>

  <rect x="187" y="88" width="88" height="32" class="box" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="231" y="102" text-anchor="middle" class="text-main">XLM-RoBERTa</text>
  <text x="231" y="113" text-anchor="middle" class="text-sub">classer</text>

  <line x1="279" y1="104" x2="305" y2="104" class="arrow"/>
  <polygon points="305,104 299,101 299,107" class="arrow-head"/>

  <rect x="309" y="88" width="105" height="32" class="box" fill="#f0fdf4" stroke="#86efac"/>
  <text x="361" y="102" text-anchor="middle" class="text-main">Corpus annoté</text>
  <text x="361" y="113" text-anchor="middle" class="text-sub">133 M + annotations</text>
</svg>
